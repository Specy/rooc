[package]
name = "rooc"
authors = ["Specy <specy.dev@gmail.com>"]
homepage = "https://rooc.specy.app"
repository = "https://github.com/specy/rooc"
documentation = "https://rooc.specy.app/docs/rooc"
description = "A mixed integer linear programming modeling language to solve linear optimization models. Extensible, works in WASM and easy to use."
readme = "README.md"
keywords = ["optimization", "milp", "solver", "mathematics", "linear-programming"]
categories = ["mathematics", "algorithms", "science"]
version = "0.2.5"
license = "MPL-2.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["microlp", "clarabel"]
microlp = ["dep:microlp"]
clarabel = ["dep:good_lp", "dep:clarabel", "good_lp/clarabel"]
coin_cbc = ["dep:good_lp", "good_lp/coin_cbc"]
highs = ["dep:good_lp", "good_lp/highs"]
lpsolve = ["dep:good_lp", "good_lp/lpsolve"]
scip = ["dep:good_lp", "good_lp/scip"]
scip_bundled = ["scip", "good_lp/scip_bundled"]
lp-solvers = ["dep:good_lp", "good_lp/lp-solvers"]
cplex-rs = ["dep:good_lp", "good_lp/cplex-rs"]

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
num-rational = "0.4.2"
num-traits = "0.2.19"
pest = { version = "2.8.6" }
pest_derive = { version = "2.8.6", features = ["grammar-extras"] }
lazy_static = "1.5.0"
indexmap = { version = "2.13.0", features = ["serde"] }
good_lp = { version = "1.15.2", default-features = false, optional = true }
clarabel = { version = "0.11.0", optional = true }
microlp = { version = "0.5.0", optional = true }
log = "0.4.29"
utf8_slice = "1.0.0"

[dev-dependencies]
serde_json = "1.0.149"

[target.'cfg(target_family = "wasm")'.dev-dependencies]
wasm-bindgen-test = "0.3.61"

[target.'cfg(target_family = "wasm")'.dependencies]
js-sys = "0.3.88"
wasm-bindgen = { version = "0.2.111", features = ["serde-serialize"] }
serde-wasm-bindgen = "0.6.5"
console_error_panic_hook = { version = "0.1.7" }


[profile.release]
opt-level = 3
lto = 'fat'
codegen-units = 1


[package.metadata.wasm-pack.profile.dev.wasm-bindgen]
dwarf-debug-info = true
